<body class="min-h-screen flex flex-col items-center justify-center p-6 md:p-12">
<!-- Minimal Header -->
<header class="w-full max-w-[600px] flex justify-between items-center mb-12">
<div class="flex items-center text-[#C4A36E]">
<span class="material-symbols-outlined mr-2" style="font-variation-settings: &quot;FILL&quot; 0; font-weight: 300;">lock</span>
<span class="font-label-sm text-label-sm" style="">دفع آمن</span>
</div>
<div class="font-display-xl text-display-xl text-primary tracking-[0.2em] uppercase text-2xl font-light" style=""><span style="color: rgb(44, 44, 44); font-family: Tajawal; letter-spacing: 4.8px; background-color: rgba(255, 255, 255, 0.25);">Lovely Smell EG</span></div>
<div class="w-[80px]"></div> <!-- Spacer to keep logo centered -->
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-[600px] flex flex-col gap-6">
<!-- Success Card -->
<section class="bg-white rounded-[16px] shadow-[0_10px_40px_-15px_rgba(196,163,110,0.1)] p-8 md:p-12 flex flex-col items-center text-center border border-[#C4A36E]/10">
<!-- Checkmark Icon -->
<div class="w-20 h-20 rounded-full bg-[#E8F3E8] flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-[#6BA86B] text-4xl" style="font-variation-settings: &quot;FILL&quot; 1;">check_circle</span>
</div>
<!-- Headings -->
<h1 class="font-headline-md text-headline-md text-primary mb-3" style="">تم تقديم الطلب بنجاح!</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-8 max-w-[400px]" style="">شكراً لثقتك، سيتواصل معك فريقنا قريباً لتأكيد الطلب</p>
<!-- Order Details Box -->
<div class="w-full bg-[#F5F1EA] rounded-lg p-6 flex flex-col gap-4 text-right mb-10 border border-[#C4A36E]/20">
<div class="flex justify-between items-center pb-4 border-b border-[#C4A36E]/20">
<span class="font-body-md text-body-md text-on-surface-variant" style="">رقم الطلب</span>
<span class="font-label-sm text-label-sm text-primary uppercase font-bold" style="">#LMN-98234</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant" style="">الإجمالي</span>
<span class="font-label-sm text-label-sm text-primary uppercase font-bold" style="">4,250 ج.م</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant" style="">طريقة الدفع</span>
<span class="font-body-md text-body-md text-primary" style="">الدفع عند الاستلام</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant" style="">موعد التوصيل المتوقع</span>
<span class="font-body-md text-body-md text-primary" style="">٢-٣ أيام عمل</span>
</div>
</div>

<div class="w-full flex flex-col gap-4">
<button class="w-full py-4 rounded-full bg-primary-container text-[#C4A36E] font-label-sm text-label-sm uppercase tracking-wider hover:shadow-[0_0_15px_rgba(196,163,110,0.3)] transition-all duration-300" style="">

        </button>
<button class="w-full py-4 rounded-full bg-transparent border-[1.5px] border-[#C4A36E] text-[#C4A36E] font-label-sm text-label-sm uppercase tracking-wider hover:bg-[#C4A36E]/5 transition-all duration-300" style="">
